name: Update VSCode Extensions

on:
  schedule:
    # Run daily at 02:00 UTC
    - cron: 0 2 * * *
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # actions/checkout v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Nix
        # DeterminateSystems/nix-installer-action v22
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Setup Python
        # actions/setup-python v6
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Update VSCode Extensions
        run: python3 scripts/update-vscode-extensions.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create automation token
        id: automation-token
        if: steps.changes.outputs.has_changes == 'true'
        uses: ./.github/actions/create-automation-token
        with:
          app-id: ${{ secrets.AUTOMATION_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}
          installation-id: ${{ secrets.AUTOMATION_APP_INSTALLATION_ID }}

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        # peter-evans/create-pull-request v8
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          token: ${{ steps.automation-token.outputs.token }}
          commit-message: "chore(vscode): update VSCode extensions"
          title: "chore(vscode): update VSCode extensions"
          body: |
            Automated update of VSCode extensions versions and hashes.

            This PR updates the extensions.nix file with the latest versions
            from the Visual Studio Code marketplace.
          branch: update-vscode-extensions
          delete-branch: true
