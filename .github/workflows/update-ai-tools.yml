name: Update AI Tools

on:
  schedule:
    # Run daily at 6:00 AM UTC (3:00 PM JST)
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-ai-tools:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        # actions/checkout v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Nix
        # DeterminateSystems/nix-installer-action v22
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Setup Python
        # actions/setup-python v6
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Update AI tools
        run: |
          ./scripts/update-ai-tools-all.sh

      - name: Build AI tools
        run: |
          ./scripts/build-ai-tools.sh

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create automation token
        id: automation-token
        if: steps.changes.outputs.has_changes == 'true'
        uses: ./.github/actions/create-automation-token
        with:
          app-id: ${{ secrets.AUTOMATION_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}
          installation-id: ${{ secrets.AUTOMATION_APP_INSTALLATION_ID }}

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        # peter-evans/create-pull-request v8
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          token: ${{ steps.automation-token.outputs.token }}
          commit-message: "chore(ai-tools): update AI tools"
          title: "chore(ai-tools): update AI tools"
          body: |
            ## AI Tools Update

            This PR contains automatic updates for AI development tools:
            - Claude Code
            - Codex CLI
            - Gemini CLI

            Changes were generated automatically by the daily update workflow.
          branch: update-ai-tools
          delete-branch: true

  update-ai-tools-macos:
    runs-on: macos-latest
    needs: update-ai-tools
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        # actions/checkout v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Fetch update branch if exists
        run: |
          if git ls-remote --exit-code --heads origin update-ai-tools; then
            git fetch origin update-ai-tools:update-ai-tools
            git checkout update-ai-tools
          fi

      - name: Install Nix
        # DeterminateSystems/nix-installer-action v22
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Setup Python
        # actions/setup-python v6
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Update Codex CLI (macOS cargoHash)
        env:
          CODEX_FORCE_CARGO_HASH: "1"
        run: |
          python3 scripts/update-codex-cli.py

      - name: Build AI tools
        run: |
          ./scripts/build-ai-tools.sh

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create automation token
        id: automation-token
        if: steps.changes.outputs.has_changes == 'true'
        uses: ./.github/actions/create-automation-token
        with:
          app-id: ${{ secrets.AUTOMATION_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}
          installation-id: ${{ secrets.AUTOMATION_APP_INSTALLATION_ID }}

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        # peter-evans/create-pull-request v8
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          token: ${{ steps.automation-token.outputs.token }}
          commit-message: "chore(ai-tools): update AI tools"
          title: "chore(ai-tools): update AI tools"
          body: |
            ## AI Tools Update

            This PR contains automatic updates for AI development tools:
            - Claude Code
            - Codex CLI
            - Gemini CLI

            Changes were generated automatically by the daily update workflow.
          branch: update-ai-tools
          delete-branch: true
