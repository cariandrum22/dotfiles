name: Update Cursor

on:
  schedule:
    # Run daily at 02:00 UTC
    - cron: 0 2 * * *
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update Cursor
        run: python3 scripts/update-cursor.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Cursor package
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          nix build --impure .#packages.x86_64-linux.cursor --print-build-logs

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(cursor): update Cursor AppImage"
          title: "chore(cursor): update Cursor AppImage"
          body: |
            Automated update of Cursor AppImage.

            This PR updates Cursor to the latest version with new sha256 hashes.
            The workflow verified the updated Cursor package builds successfully before opening this PR.
          branch: update-cursor
          delete-branch: true
          labels: |
            dependencies
            automated
